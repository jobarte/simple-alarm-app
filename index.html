<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alarm App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Alarm Clock</h1>

    <div class="clock" id="clock">00:00:00</div>
    <div class="date" id="date"></div>

    <div class="divider"></div>

    <div class="alarm-set">
      <label>Set Alarm</label>
      <input type="time" id="alarmTime">
      <button id="setBtn" onclick="setAlarm()">Set Alarm</button>
    </div>

    <div class="status-wrap">
      <div class="status" id="status">No alarm set</div>
    </div>

    <button id="cancelBtn" onclick="cancelAlarm()" style="display:none">Cancel Alarm</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
